lifecycle_manager_localization:
  ros__parameters:
    autostart: true
    node_names: ['map_server', 'amcl']
    bond_timeout: 15.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
    bond_heartbeat_period: 0.25
    introspection_mode: "disabled"

lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    bond_timeout: 15.0
    node_names: 
     - 'controller_server'
     - 'smoother_server'
     - 'planner_server'
     - 'route_server'
     - 'behavior_server'
     - 'velocity_smoother'
     - 'collision_monitor'
     - 'bt_navigator'
     - 'waypoint_follower'
     - 'docking_server'
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
    bond_heartbeat_period: 0.25
    introspection_mode: "disabled"

map_server:
  ros__parameters:
    use_sim_time: true
    # NOTE: Must be an absolute path at runtime. We set it from the launch file
    # to avoid relying on YAML-time substitutions.
    yaml_filename: "" # Set from launch file
    topic_name: "map"
    frame_id: "map"

map_saver:
  ros__parameters:
    save_map_timeout: 10.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    introspection_mode: "disabled"

amcl:
  ros__parameters:
    use_sim_time: true
    # Webots Tesla URDF publishes LaserScan on /scan_front and /scan_rear.
    # Nav2 AMCL expects a single scan topic, so we use the front lidar.
    scan_topic: "/scan_front"
    map_topic: "map"
    first_map_only: false
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link" 
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1
    random_seed: -1
    update_min_d: 0.25
    update_min_a: 0.2
    save_pose_rate: 0.5
    always_reset_initial_pose: false
    # This pose is in the saved map frame, not in absolute Webots world
    # coordinates. The current map was built with the vehicle starting near
    # map (0, 0), while the Webots world pose is different.
    set_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    robot_model_type: "nav2_amcl::OmniMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    laser_model_type: "likelihood_field"
    laser_min_range: -1.0
    laser_max_range: -1.0
    max_beams: 60
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.2
    z_hit: 0.5
    z_rand: 0.5
    z_max: 0.05
    z_short: 0.05
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    tf_broadcast: true
    transform_tolerance: 1.0
    bond_heartbeat_period: 0.1
    introspection_mode: "disabled"

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 2.0
    allow_partial_planning: true
    costmap_update_timeout: 1.0
    bond_heartbeat_period: 0.25
    introspection_mode: "disabled"
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      tolerance: 0.5
      allow_unknown: true
      downsample_costmap: false
      max_iterations: 1000000
      max_planning_time: 2.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      minimum_turning_radius: 4.3
      reverse_penalty: 2.0
      change_penalty: 0.1
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 22.0
      lookup_table_size: 25.0
      cache_obstacle_heuristic: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

route_server:
  ros__parameters:
    use_sim_time: true
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: "map"
      robot_base_frame: "base_link"
      update_frequency: 1.0
      publish_frequency: 1.0
      transform_tolerance: 1.5
      rolling_window: false
      track_unknown_space: true
      always_send_full_costmap: true
      introspection_mode: "disabled"
      footprint: "[[-2.3, -0.9], [-2.3, 0.9], [2.3, 0.9], [2.3, -0.9]]"
      footprint_padding: 0.03
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 2.6
        cost_scaling_factor: 3.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: "odom"
      robot_base_frame: "base_link"
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 1.5
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.05
      introspection_mode: "disabled"
      footprint: "[[-2.3, -0.9], [-2.3, 0.9], [2.3, 0.9], [2.3, -0.9]]"
      footprint_padding: 0.03
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        footprint_clearing_enabled: true
        max_obstacle_height: 2.0
        scan:
          topic: /scan_front
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 2.5
          raytrace_max_range: 3.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: false
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 1.5
        cost_scaling_factor: 3.0

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    failure_tolerance: 0.3
    odom_topic: "odom"
    odom_duration: 0.3
    enable_stamped_cmd_vel: false
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    path_handler_plugins: ["path_handler"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.4
      yaw_goal_tolerance: 0.25
      stateful: true
    path_handler:
      plugin: "nav2_controller::FeasiblePathHandler"
      prune_distance: 1.5
      enforce_path_inversion: false
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_velocity: 1.0
      lookahead_dist: 1.5
      min_lookahead_dist: 0.8
      max_lookahead_dist: 2.5
      lookahead_time: 1.5
      use_regulated_linear_velocity_scaling: true
      regulated_linear_velocity_min_radius: 4.5
      regulated_linear_velocity_min_speed: 0.8
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0
      use_collision_detection: true
      max_allowed_time_to_collision: 2.0

behavior_server:
  ros__parameters:
    use_sim_time: true
    cycle_frequency: 10.0
    transform_tolerance: 0.1
    local_frame: "odom"
    global_frame: "map"
    robot_base_frame: "base_link"
    local_costmap_topic: "local_costmap/costmap_raw"
    local_footprint_topic: "local_costmap/published_footprint"
    global_costmap_topic: "global_costmap/costmap_raw"
    global_footprint_topic: "global_costmap/published_footprint"
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: "map"
    robot_base_frame: "base_link"
    odom_topic: "odom"
    transform_tolerance: 0.1
    bt_loop_duration: 10
    default_server_timeout: 20
    default_cancel_timeout: 50
    introspection_mode: "disabled"
    default_nav_to_pose_bt_xml: "navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "navigate_through_poses_w_replanning_and_recovery.xml"
    always_reload_bt_xml: false
    bt_log_idle_transitions: false
    goal_blackboard_id: "goal"
    goals_blackboard_id: "goals"
    path_blackboard_id: "path"
    waypoint_statuses_blackboard_id: "waypoint_statuses"
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1667
      search_window: 2.0
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      enable_groot_monitoring: false
      groot_server_port: 1669
      search_window: 2.0
    bt_search_directories:
      - "$(find-pkg-share webots_ros2_tesla_slam)/behavior_trees"
      - "$(find-pkg-share nav2_bt_navigator)/behavior_trees"
    error_code_name_prefixes:
      - assisted_teleop
      - backup
      - compute_path
      - dock_robot
      - drive_on_heading
      - follow_path
      - nav_thru_poses
      - nav_to_pose
      - spin
      - route
      - undock_robot
      - wait

collision_monitor:
  ros__parameters:
    enabled: true
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 0.5
    base_shift_correction: true
    stop_pub_timeout: 1.0
    enable_stamped_cmd_vel: false
    use_realtime_priority: false
    polygons: ["VelocityPolygonStop", "PolygonSlowdown"]
    VelocityPolygonStop:
      type: "velocity_polygon"
      action_type: "stop"
      min_points: 3
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true
      holonomic: false
      velocity_polygons: ["fast_forward", "slow_forward", "backward", "stopped"]
      fast_forward:
        points: "[[-2.3, -1.0], [-2.3, 1.0], [5.0, 1.0], [5.0, -1.0]]"
        linear_min: 1.5
        linear_max: 5.0
        theta_min: -1.0
        theta_max: 1.0
      slow_forward:
        points: "[[-2.3, -1.0], [-2.3, 1.0], [3.0, 1.0], [3.0, -1.0]]"
        linear_min: 0.05
        linear_max: 1.5
        theta_min: -1.0
        theta_max: 1.0
      backward:
        points: "[[-3.2, -1.0], [-3.2, 1.0], [2.3, 1.0], [2.3, -1.0]]"
        linear_min: -2.0
        linear_max: -0.05
        theta_min: -1.0
        theta_max: 1.0
      stopped:
        points: "[[-2.6, -1.1], [-2.6, 1.1], [2.6, 1.1], [2.6, -1.1]]"
        linear_min: -0.05
        linear_max: 0.05
        theta_min: -1.0
        theta_max: 1.0
    PolygonSlowdown:
      type: "polygon"
      points: "[[-4.5, -1.2], [-4.5, 1.2], [6.5, 1.2], [6.5, -1.2]]"
      action_type: "slowdown"
      min_points: 4
      slowdown_ratio: 0.3
      visualize: true
      polygon_pub_topic: "polygon_slowdown"
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan_front"
      enabled: true
      source_timeout: 0.2

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: true
    feedback: "OPEN_LOOP"
    max_velocity: [5.0, 0.0, 1.5]
    min_velocity: [-2.0, 0.0, -1.5]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.5
    max_accel: [1.8, 0.0, 2.0]
    max_decel: [-2.5, 0.0, -2.5]
    enable_stamped_cmd_vel: false
    stamp_smoothed_velocity_with_smoothing_time: false
    use_realtime_priority: false

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    introspection_mode: "disabled"
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 3000

docking_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05
      staging_x_offset: -0.7
      use_external_detection_pose: true
      use_battery_status: false
      use_stall_detection: false
      dock_direction: "forward"
      external_detection_timeout: 1.0
      external_detection_translation_x: -0.18
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: -1.57
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1
    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      use_collision_detection: true
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3
